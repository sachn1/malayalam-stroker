repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4  # keep in sync with python/pyproject.toml's commitizen version
    hooks:
      - id: commitizen  # enforces conventional commit messages (see CONTRIBUTING.md)
        stages: [commit-msg]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args:
          - --fail-under=90
          - --ignore-init-module
          - --ignore-magic
          - python/src
          - tools

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        files: ^(js/src|tools|demo|tests)/.*\.js$

      - id: validate-data
        name: validate-data (glyph-data/stroke-data structural integrity)
        entry: python3 tools/validate_data.py
        language: system
        pass_filenames: false
        files: ^js/src/(glyph-data|stroke-data(\.raw)?)\.json$
