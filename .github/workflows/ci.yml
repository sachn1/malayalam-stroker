name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  python:
    name: Python (lint, tests, data integrity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      # Everything after toolchain setup funnels through the Makefile, so
      # local `make ci-py` and this CI job never drift apart.
      - name: make ci-py
        run: make ci-py

  js:
    name: JS (lint, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: make ci-js
        run: make ci-js
