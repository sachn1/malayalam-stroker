<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jayasree - interactive demo</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="../js/src/style.css" />
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <div id="logo-stage"></div>
    <p class="tagline">malayalam stroker</p>
    <p class="sub">Type any word and watch it be written.</p>

    <form id="traceForm">
      <input id="wordInput" type="text" value="നന്ദി" lang="ml" autocomplete="off" />
      <button type="submit" id="traceBtn">Trace</button>
    </form>

    <div class="chips">
      Try: &nbsp;
      <button type="button" data-word="അമ്മ">അമ്മ</button>
      <button type="button" data-word="നന്ദി">നന്ദി</button>
      <button type="button" data-word="മലയാളം">മലയാളം</button>
      <button type="button" data-word="ആലയം">ആലയം</button>
      <button type="button" data-word="ക്ഷമിക്കണം">ക്ഷമിക്കണം</button>
      <button type="button" data-word="ജയശ്രീ">ജയശ്രീ</button>
      <button type="button" data-word="നോവ്">നോവ്</button>
      <button type="button" data-word="ധൃഷ്ടദ്യുമ്നൻ">ധൃഷ്ടദ്യുമ്നൻ</button>
      <button type="button" data-word="പ്രദ്യുമ്നൻ">പ്രദ്യുമ്നൻ</button>
    </div>

    <div id="status"></div>
    <div id="stage"></div>
    <button id="replay" type="button">↺ Replay</button>

    <div id="controls">
      <label>
        Speed
        <input id="speedCtl" type="range" min="0.25" max="3" step="0.25" value="1" />
        <span id="speedVal" class="ctl-val">1×</span>
      </label>
      <label>
        Thickness
        <input id="thicknessCtl" type="range" min="0.010" max="0.050" step="0.004" value="0.022" />
        <span id="thicknessVal" class="ctl-val">medium</span>
      </label>
      <label>
        Repeat
        <select id="countCtl">
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="3">3×</option>
          <option value="5">5×</option>
        </select>
      </label>
    </div>

    <div id="lib-bar">
      <p>Load hand-authored strokes from the recorder:</p>
      <label id="lib-drop">
        Drop <strong>stroke-library.json</strong> here or click to browse
        <input type="file" id="lib-file" accept=".json" style="display: none" />
      </label>
      <p id="lib-status"></p>
    </div>

    <script type="module" src="demo.js"></script>
  </body>
</html>
