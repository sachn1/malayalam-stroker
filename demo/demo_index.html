<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>malayalam-stroker — interactive demo</title>
    <link rel="stylesheet" href="../js/src/style.css" />
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <h1>malayalam-stroker</h1>
    <p class="sub">Type any word and watch it be written.</p>

    <form id="traceForm">
      <input id="wordInput" type="text" value="നന്ദി" lang="ml" autocomplete="off" />
      <button type="submit" id="traceBtn">Trace</button>
    </form>

    <div class="chips">
      Try: &nbsp;
      <button type="button" data-word="നന്ദി">നന്ദി</button>
      <button type="button" data-word="മലയാളം">മലയാളം</button>
      <button type="button" data-word="ആലയം">ആലയം</button>
      <button type="button" data-word="ക്ഷമിക്കണം">ക്ഷമിക്കണം</button>
      <button type="button" data-word="സ്നേഹം">സ്നേഹം</button>
    </div>

    <div id="status"></div>
    <div id="stage"></div>
    <button id="replay" type="button">↺ Replay</button>

    <div id="lib-bar">
      <p>Load hand-authored strokes from the recorder:</p>
      <label id="lib-drop">
        Drop <strong>stroke-library.json</strong> here or click to browse
        <input type="file" id="lib-file" accept=".json" style="display: none" />
      </label>
      <p id="lib-status"></p>
    </div>

    <script type="module" src="demo.js"></script>
  </body>
</html>
